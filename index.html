<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGAS - Aportes Socioambientais</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- PDF.js para leitura de documentos no navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // Configuração obrigatória do worker do PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <!-- Estilos Customizados -->
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    
    @media print {
      body { background: white !important; color: black !important; }
      .hide-on-print { display: none !important; }
      aside, .chatbot-widget { display: none !important; }
      main { overflow: visible !important; }
      .print-area { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
      * { border-color: #ddd !important; }
      .bg-slate-800\/40, .bg-slate-800\/80 { background: white !important; border: 1px solid #ccc !important; }
      .text-white, .text-slate-200, .text-slate-300, .text-slate-400 { color: black !important; }
    }
  </style>

  <!-- Import Maps -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
      }
    }
  </script>

  <!-- Babel para compilar JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0B132B] text-slate-200">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      LayoutDashboard, FileText, CheckSquare, Settings, 
      MessageSquare, Upload, Plus, AlertCircle, CheckCircle2, 
      XCircle, Clock, PieChart as PieChartIcon, BarChart3, 
      Leaf, Building, FileBarChart, Loader2, Send, Copy
    } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, addDoc } from 'firebase/firestore';

    // ============================================================================
    // FIREBASE CONFIGURATION (Substitua pelas suas chaves)
    // ============================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCnqsqhvhkWKLoHziTBBBQg8qYnJLltW0Y",
      authDomain: "esgevereste.firebaseapp.com",
      projectId: "esgevereste",
      storageBucket: "esgevereste.firebasestorage.app",
      messagingSenderId: "334418810086",
      appId: "1:334418810086:web:3c46bcb1a3dfcb471d9727"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const appId = 'sgas-app-prod';
    const COLLECTION_NAME = 'sgas_projects_v1';
    const SETTINGS_COLLECTION = 'sgas_settings_v1';

    // ============================================================================
    // MÓDULO IA (Motor Heurístico Local baseado em dados + TEXTO DO PDF)
    // ============================================================================
    async function callGemini(prompt, schema = null) {
      return new Promise(resolve => {
        const delay = Math.floor(Math.random() * 800) + 1200;
        
        setTimeout(() => {
          if (schema) {
            try {
              const data = JSON.parse(prompt);
              
              // JUNTA OS DADOS MANUAIS COM O TEXTO EXTRAÍDO DO PDF!
              const textoAnalise = (data.descricao + " " + data.contrapartidas + " " + data.publicoAlvo + " " + (data.pdfText || "")).toLowerCase();
              const valor = Number(data.valor) || 0;

              let scoreAmb = 30;
              let scoreSoc = 30;
              let scoreGov = 30;

              // 1. Critérios Ambientais (procura no Formulário E no PDF)
              if (textoAnalise.includes('reciclagem') || textoAnalise.includes('resíduos')) scoreAmb += 20;
              if (textoAnalise.includes('carbono') || textoAnalise.includes('emissão')) scoreAmb += 20;
              if (textoAnalise.includes('natureza') || textoAnalise.includes('meio ambiente') || textoAnalise.includes('água') || textoAnalise.includes('energia')) scoreAmb += 15;
              if (data.vertical === 'Turismo e Meio Ambiente') scoreAmb += 15;

              // 2. Critérios Sociais
              if (textoAnalise.includes('comunidade') || textoAnalise.includes('local') || textoAnalise.includes('vulnerável') || textoAnalise.includes('social')) scoreSoc += 25;
              if (textoAnalise.includes('educação') || textoAnalise.includes('inclusão') || textoAnalise.includes('esporte') || textoAnalise.includes('cultura') || textoAnalise.includes('capacitação')) scoreSoc += 20;
              if (textoAnalise.includes('crianças') || textoAnalise.includes('jovens') || textoAnalise.includes('mulheres')) scoreSoc += 15;

              // 3. Critérios de Governança
              if (textoAnalise.includes('transparência') || textoAnalise.includes('auditoria') || textoAnalise.includes('relatório') || textoAnalise.includes('prestação de contas')) scoreGov += 25;
              if (textoAnalise.includes('kpi') || textoAnalise.includes('métricas') || textoAnalise.includes('indicadores') || textoAnalise.includes('compliance')) scoreGov += 20;
              if (data.contrapartidas.length > 50) scoreGov += 15;

              // Randomização natural limitada a 100
              scoreAmb = Math.min(100, scoreAmb + Math.floor(Math.random()*15));
              scoreSoc = Math.min(100, scoreSoc + Math.floor(Math.random()*15));
              scoreGov = Math.min(100, scoreGov + Math.floor(Math.random()*15));

              const media = (scoreAmb + scoreSoc + scoreGov) / 3;

              let recomendacao = "Revisão";
              let justificativa = "O projeto e o documento anexo carecem de detalhamento claro em métricas ESG. Solicitar mais informações.";
              
              if (media >= 75 && valor <= 500000) {
                recomendacao = "Aprovação";
                justificativa = "O projeto (incluindo o documento lido) apresenta excelente alinhamento com as verticais estratégicas.";
              } else if (media >= 85 && valor > 500000) {
                recomendacao = "Aprovação";
                justificativa = "Apesar do alto valor solicitado, o documento estrutural do projeto apresenta garantias ESG robustas.";
              } else if (media < 50 || (valor > 1000000 && media < 75)) {
                recomendacao = "Rejeição";
                justificativa = valor > 1000000 && media < 75 
                  ? "Risco Crítico: Valor elevado para o nível de maturidade ESG apresentado no projeto e nos documentos." 
                  : "Baixo impacto: Nenhuma evidência concreta de sustentabilidade ou impacto foi encontrada na documentação.";
              }

              // Verifica se leu muito texto do PDF para dar um bónus ou penalização visual
              const infoPDF = data.pdfText && data.pdfText.length > 50 
                ? ` O sistema processou com sucesso o documento anexo (${Math.round(data.pdfText.length / 100)} palavras).` 
                : ` Atenção: O documento anexo parece estar vazio, ser uma imagem digitalizada s/ texto ou ser muito curto.`;

              resolve({
                ambiental: scoreAmb,
                social: scoreSoc,
                governanca: scoreGov,
                resumo: `A análise do protocolo identificou foco em '${data.publicoAlvo.substring(0, 30)}...'.` + infoPDF + ` O aporte obteve nota global de ${Math.round(media)}/100.`,
                recomendacao: recomendacao,
                justificativa: justificativa
              });
            } catch (e) {
              resolve({ ambiental: 0, social: 0, governanca: 0, resumo: "Falha catastrófica ao ler os dados do formulário e do PDF.", recomendacao: "Revisão", justificativa: "Erro técnico." });
            }
          } else {
            resolve("Analisando o comportamento do portfólio... Sugiro priorizar projetos com forte política de transparência e documentação em PDF validada.");
          }
        }, delay);
      });
    }

    // ============================================================================
    // MAIN APP LAYOUT
    // ============================================================================
    function SGASApp() {
      const [user, setUser] = useState(null);
      const [projects, setProjects] = useState([]);
      const [budget, setBudget] = useState(5000000);
      const [currentView, setCurrentView] = useState('dashboard');
      const [selectedProject, setSelectedProject] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loginError, setLoginError] = useState(null);
      const [currentDomain, setCurrentDomain] = useState('');

      useEffect(() => {
        setCurrentDomain(window.location.hostname || "local");
        const unsubscribeAuth = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser) {
            if (currentUser.email && !currentUser.email.endsWith('@evereste.org.br')) {
              await signOut(auth);
              setUser(null);
              setLoginError("Acesso negado: Utilize um e-mail corporativo @evereste.org.br");
            } else {
              setUser(currentUser);
              setLoginError(null);
            }
          } else {
            setUser(null);
          }
          setLoading(false);
        });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const settingsRef = collection(db, 'artifacts', appId, 'public', 'data', SETTINGS_COLLECTION);
        const unsubSettings = onSnapshot(settingsRef, (snapshot) => {
          snapshot.forEach(doc => { if (doc.id === 'global') setBudget(doc.data().budget || 5000000); });
        });

        const projectsRef = collection(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME);
        const unsubProjects = onSnapshot(projectsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => b.createdAt - a.createdAt);
          setProjects(data);
          setLoading(false);
        });

        return () => { unsubSettings(); unsubProjects(); };
      }, [user]);

      const handleUpdateBudget = async (newBudget) => {
        if (!user || !db) return;
        setBudget(newBudget);
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', SETTINGS_COLLECTION, 'global'), { budget: newBudget }, { merge: true });
      };

      const handleLogin = async () => {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ hd: 'evereste.org.br' }); 
        setLoginError(null);
        try {
          await signInWithPopup(auth, provider);
        } catch (error) {
          if (error.code === 'auth/unauthorized-domain') {
            setLoginError('O domínio deste ambiente não está autorizado no seu Firebase.');
          } else if (error.code !== 'auth/cancelled-popup-request' && error.code !== 'auth/popup-closed-by-user') {
            setLoginError("Erro ao tentar fazer login: " + error.message);
          }
        }
      };

      const navigateTo = (view, project = null) => {
        setCurrentView(view);
        setSelectedProject(project);
      };

      if (loading) return <div className="flex h-screen items-center justify-center"><Loader2 className="w-8 h-8 animate-spin text-[#10b981]" /></div>;

      // LOGIN SCREEN
      if (!user) {
        return (
          <div className="flex h-screen items-center justify-center font-sans">
            <div className="bg-slate-800/50 border border-slate-700 p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
              <div className="bg-[#10b981]/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
                <Leaf className="w-8 h-8 text-[#10b981]" />
              </div>
              <h1 className="text-2xl font-bold text-white mb-2">SGAS - Acesso Restrito</h1>
              <p className="text-slate-400 mb-6">Faça login com seu e-mail corporativo.</p>
              
              <button onClick={handleLogin} className="w-full bg-white text-slate-900 hover:bg-slate-100 font-semibold py-3 px-4 rounded-lg flex items-center justify-center gap-3 transition-colors shadow-lg">
                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continuar com Google
              </button>

              {loginError && (
                <div className="mt-6 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-left animate-fade-in">
                  <div className="flex items-center gap-2 mb-2">
                    <AlertCircle className="w-5 h-5 text-red-400" />
                    <p className="text-red-400 text-sm font-bold">Ação Necessária no Firebase:</p>
                  </div>
                  <p className="text-slate-300 text-xs mb-3">{loginError}</p>
                  <div className="bg-slate-900 p-2.5 rounded-lg flex justify-between items-center border border-slate-700">
                    <code className="text-xs text-indigo-300 truncate mr-2" title={currentDomain}>{currentDomain}</code>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      const totalSolicitado = projects.reduce((acc, p) => acc + (Number(p.valor) || 0), 0);
      const totalAprovado = projects.filter(p => p.status === 'Aprovado').reduce((acc, p) => acc + (Number(p.valor) || 0), 0);
      const saldoDisponivel = budget - totalAprovado;

      return (
        <div className="flex h-screen overflow-hidden">
          <aside className="w-64 bg-[#0a1024] border-r border-slate-800 flex flex-col z-20 shadow-xl">
            <div className="p-6 border-b border-slate-800 flex items-center gap-3">
              <div className="bg-[#10b981] p-2 rounded-lg"><Leaf className="w-6 h-6 text-white" /></div>
              <div>
                <h1 className="text-xl font-bold text-white tracking-wider">SGAS</h1>
                <p className="text-xs text-slate-400 truncate w-32" title={user.email}>{user.email}</p>
              </div>
            </div>
            <nav className="flex-1 py-6 px-4 space-y-2">
              <NavItem icon={LayoutDashboard} label="Dashboard" active={currentView === 'dashboard'} onClick={() => navigateTo('dashboard')} />
              <NavItem icon={Plus} label="Novo Protocolo" active={currentView === 'form'} onClick={() => navigateTo('form')} />
              <NavItem icon={CheckSquare} label="Auditoria & Análise" active={currentView === 'audit' || currentView === 'audit-detail'} onClick={() => navigateTo('audit')} />
            </nav>
            <div className="p-4 border-t border-slate-800">
              <div className="bg-slate-800/50 rounded-lg p-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-medium">Orçamento</span>
                  <Settings className="w-4 h-4 text-slate-400 cursor-pointer hover:text-white" onClick={() => {
                    const b = prompt("Novo Budget (R$):", budget);
                    if (b && !isNaN(b)) handleUpdateBudget(Number(b));
                  }} />
                </div>
                <div className="w-full bg-slate-700 rounded-full h-2.5 mb-2">
                  <div className="bg-[#10b981] h-2.5 rounded-full" style={{ width: `${Math.min((totalAprovado / budget) * 100, 100)}%` }}></div>
                </div>
                <div className="flex justify-between text-xs text-slate-400 mb-4">
                  <span>{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(totalAprovado)}</span>
                  <span>{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(budget)}</span>
                </div>
                <button onClick={() => signOut(auth)} className="w-full text-xs text-red-400 hover:bg-red-400/10 py-1.5 rounded flex items-center justify-center gap-1 border border-red-500/20">
                  <XCircle className="w-3 h-3" /> Encerrar Sessão
                </button>
              </div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col relative overflow-hidden">
            <div className="flex-1 overflow-y-auto p-8 custom-scrollbar pb-24">
              {currentView === 'dashboard' && <DashboardView projects={projects} totalAprovado={totalAprovado} totalSolicitado={totalSolicitado} />}
              {currentView === 'form' && <SolicitationForm db={db} appId={appId} onSuccess={() => navigateTo('audit')} />}
              {currentView === 'audit' && <AuditListView projects={projects} onSelect={(p) => navigateTo('audit-detail', p)} />}
              {currentView === 'audit-detail' && selectedProject && <AuditDetailView project={selectedProject} db={db} appId={appId} onBack={() => navigateTo('audit')} />}
            </div>
            <AIChatWidget projects={projects} budget={budget} totalAprovado={totalAprovado} saldoDisponivel={saldoDisponivel} />
          </main>
        </div>
      );
    }

    // ============================================================================
    // SUB-COMPONENTS
    // ============================================================================
    function NavItem({ icon: Icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${active ? 'bg-[#10b981]/10 text-[#10b981] border border-[#10b981]/20' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
          <Icon className="w-5 h-5" /> {label}
        </button>
      );
    }

    function DashboardView({ projects, totalAprovado, totalSolicitado }) {
      const ativos = projects.filter(p => p.status === 'Aprovado').length;
      const emAnalise = projects.filter(p => p.status === 'Pendente').length;
      return (
        <div className="space-y-6 animate-fade-in">
          <header className="mb-8"><h2 className="text-3xl font-bold text-white">Painel de Controle</h2></header>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <KpiCard title="Total Solicitado" value={new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(totalSolicitado)} icon={FileText} />
            <KpiCard title="Total Aprovado" value={new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(totalAprovado)} icon={CheckCircle2} color="text-[#10b981]" />
            <KpiCard title="Projetos Ativos" value={ativos} icon={Clock} />
            <KpiCard title="Em Análise" value={emAnalise} icon={FileBarChart} color="text-yellow-400" />
          </div>
        </div>
      );
    }

    function KpiCard({ title, value, icon: Icon, color = "text-indigo-400" }) {
      return (
        <div className="bg-slate-800/40 border border-slate-700/50 rounded-xl p-5 hover:bg-slate-800/60">
          <div className="flex items-start justify-between">
            <div><p className="text-slate-400 text-sm mb-1">{title}</p><h4 className="text-xl font-bold text-white">{value}</h4></div>
            <div className={`p-2 rounded-lg bg-slate-800 border border-slate-700 ${color}`}><Icon className="w-5 h-5" /></div>
          </div>
        </div>
      );
    }

    function SolicitationForm({ db, appId, onSuccess }) {
      const [formData, setFormData] = useState({ nome: '', proponente: '', cnpj: '', valor: '', dataEvento: '', vertical: 'Desenvolvimento e ESG', publicoAlvo: '', contrapartidas: '', descricao: '' });
      const [file, setFile] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [loadingStep, setLoadingStep] = useState('');
      
      // FUNÇÃO QUE EXTRAI TEXTO DO PDF
      const extractTextFromPDF = async (pdfFile) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async function() {
            try {
              const typedarray = new Uint8Array(this.result);
              // Usa o pdfjsLib nativo carregado via script tag
              const pdf = await pdfjsLib.getDocument(typedarray).promise;
              let fullText = '';
              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + ' ';
              }
              resolve(fullText);
            } catch (error) {
              console.error("Erro na extração do PDF", error);
              resolve(""); // Resolve vazio em caso de erro para não travar o fluxo
            }
          };
          reader.onerror = () => resolve("");
          reader.readAsArrayBuffer(pdfFile);
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        
        let pdfExtractedText = "";

        if (file) {
          setLoadingStep('Extraindo dados do PDF Anexo...');
          pdfExtractedText = await extractTextFromPDF(file);
        }
        
        setLoadingStep('IA processando Análise ESG...');
        
        // Envia os dados do formulário + Texto do PDF
        const payloadData = { ...formData, pdfText: pdfExtractedText };
        const prompt = JSON.stringify(payloadData);
        
        const schema = {
          type: "OBJECT",
          properties: {
            ambiental: { type: "INTEGER" }, social: { type: "INTEGER" }, governanca: { type: "INTEGER" },
            resumo: { type: "STRING" }, recomendacao: { type: "STRING" }, justificativa: { type: "STRING" }
          },
          required: ["ambiental", "social", "governanca", "resumo", "recomendacao", "justificativa"]
        };

        const aiResult = await callGemini(prompt, schema);
        setLoadingStep('Salvando Protocolo Seguro...');
        
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sgas_projects_v1'), {
          ...formData, 
          valor: Number(formData.valor), 
          status: 'Pendente', 
          fileName: file ? file.name : null,
          esgScore: aiResult, 
          createdAt: Date.now(),
          timeline: [{ date: Date.now(), type: 'submission', title: 'Protocolo Submetido', desc: 'Documento e dados processados pelo Sistema ESG.' }]
        });
        
        setIsSubmitting(false);
        onSuccess();
      };

      if (isSubmitting) return <div className="flex justify-center items-center h-64"><Loader2 className="w-12 h-12 animate-spin text-[#10b981]" /><span className="ml-4">{loadingStep}</span></div>;

      return (
        <form onSubmit={handleSubmit} className="bg-slate-800/40 border border-slate-700/50 rounded-xl p-8 space-y-6">
          <h2 className="text-2xl font-bold mb-4">Novo Protocolo</h2>
          <div className="grid grid-cols-2 gap-4">
            <input required placeholder="Nome do Projeto" className="bg-slate-900 border border-slate-700 p-2 rounded" onChange={e => setFormData({...formData, nome: e.target.value})} />
            <input required placeholder="Proponente / CNPJ" className="bg-slate-900 border border-slate-700 p-2 rounded" onChange={e => setFormData({...formData, proponente: e.target.value})} />
            <input required type="number" placeholder="Valor (R$)" className="bg-slate-900 border border-slate-700 p-2 rounded" onChange={e => setFormData({...formData, valor: e.target.value})} />
            <input required type="date" className="bg-slate-900 border border-slate-700 p-2 rounded" onChange={e => setFormData({...formData, dataEvento: e.target.value})} />
          </div>
          <textarea required placeholder="Público Alvo (Ex: 200 jovens da comunidade)" rows="2" className="w-full bg-slate-900 border border-slate-700 p-2 rounded" onChange={e => setFormData({...formData, publicoAlvo: e.target.value})}></textarea>
          <textarea required placeholder="Contrapartidas Oferecidas" rows="2" className="w-full bg-slate-900 border border-slate-700 p-2 rounded" onChange={e => setFormData({...formData, contrapartidas: e.target.value})}></textarea>
          <textarea required placeholder="Descrição do Projeto" rows="4" className="w-full bg-slate-900 border border-slate-700 p-2 rounded" onChange={e => setFormData({...formData, descricao: e.target.value})}></textarea>
          
          <div className="mt-4">
            <label className="block text-sm text-slate-400 mb-2">Anexar Documento PDF (Projeto Técnico / Ofício)</label>
            <input type="file" accept="application/pdf" className="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" onChange={e => setFile(e.target.files[0])} required />
          </div>

          <button type="submit" className="bg-[#10b981] px-6 py-2 rounded text-white font-bold w-full mt-4">Submeter para Análise (Formulário + PDF)</button>
        </form>
      );
    }

    function AuditListView({ projects, onSelect }) {
      return (
        <div className="bg-slate-800/40 rounded-xl p-6">
          <h2 className="text-2xl font-bold mb-6">Auditoria</h2>
          <div className="space-y-4">
            {projects.map(p => (
              <div key={p.id} className="flex justify-between items-center bg-slate-900 p-4 rounded-lg border border-slate-700 hover:border-indigo-500 transition-colors">
                <div>
                  <p className="font-bold text-white">{p.nome}</p>
                  <p className="text-xs text-slate-400 mt-1 flex items-center gap-2">
                    <span className={`w-2 h-2 rounded-full ${p.status === 'Aprovado' ? 'bg-[#10b981]' : p.status === 'Rejeitado' ? 'bg-red-500' : 'bg-yellow-500'}`}></span>
                    {p.status} &bull; {new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(p.valor)}
                  </p>
                </div>
                <button onClick={() => onSelect(p)} className="bg-slate-700 hover:bg-indigo-600 text-sm px-4 py-2 rounded transition-colors">Abrir Processo</button>
              </div>
            ))}
            {projects.length === 0 && <p className="text-center text-slate-500 py-8">Nenhum projeto pendente.</p>}
          </div>
        </div>
      );
    }

    function AuditDetailView({ project, db, appId, onBack }) {
      const addActionToTimeline = async (type, status) => {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sgas_projects_v1', project.id);
        await updateDoc(docRef, { status, timeline: [...(project.timeline || []), { date: Date.now(), type, title: status, desc: 'Ação manual.' }]});
        onBack();
      };
      const esg = project.esgScore || { ambiental: 0, social: 0, governanca: 0, resumo: "", recomendacao: "Pendente" };
      
      return (
        <div className="space-y-6">
          <button onClick={onBack} className="text-slate-400 hover:text-white transition-colors">← Voltar à Fila</button>
          <div className="bg-slate-800/40 p-8 rounded-xl border border-slate-700">
            <div className="flex justify-between items-start mb-6">
              <div>
                <h2 className="text-3xl font-bold text-white">{project.nome}</h2>
                <p className="text-slate-400 mt-1">Anexo processado: {project.fileName || 'Nenhum'}</p>
              </div>
              <div className="text-right">
                <p className="text-2xl font-bold text-[#10b981]">{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(project.valor)}</p>
              </div>
            </div>
            
            <div className="grid grid-cols-3 gap-4 mb-6">
              <div className="bg-slate-900 border border-slate-700 p-4 rounded-lg"><p className="text-slate-400 text-sm mb-1">Score Ambiental</p><div className="w-full bg-slate-800 rounded-full h-2 mb-1"><div className="bg-emerald-500 h-2 rounded-full" style={{width:`${esg.ambiental}%`}}></div></div><p className="text-right text-xs text-emerald-400">{esg.ambiental}/100</p></div>
              <div className="bg-slate-900 border border-slate-700 p-4 rounded-lg"><p className="text-slate-400 text-sm mb-1">Score Social</p><div className="w-full bg-slate-800 rounded-full h-2 mb-1"><div className="bg-blue-500 h-2 rounded-full" style={{width:`${esg.social}%`}}></div></div><p className="text-right text-xs text-blue-400">{esg.social}/100</p></div>
              <div className="bg-slate-900 border border-slate-700 p-4 rounded-lg"><p className="text-slate-400 text-sm mb-1">Score Governança</p><div className="w-full bg-slate-800 rounded-full h-2 mb-1"><div className="bg-indigo-500 h-2 rounded-full" style={{width:`${esg.governanca}%`}}></div></div><p className="text-right text-xs text-indigo-400">{esg.governanca}/100</p></div>
            </div>

            <div className={`p-4 rounded-lg border mb-6 ${esg.recomendacao === 'Aprovação' ? 'bg-emerald-500/10 border-emerald-500/30' : esg.recomendacao === 'Rejeição' ? 'bg-red-500/10 border-red-500/30' : 'bg-yellow-500/10 border-yellow-500/30'}`}>
              <p className="font-bold text-lg mb-1">{esg.recomendacao}</p>
              <p className="text-sm opacity-90">{esg.justificativa}</p>
            </div>

            <p className="text-slate-300 italic mb-8 border-l-4 border-slate-600 pl-4">"{esg.resumo}"</p>
            
            {project.status === 'Pendente' && (
              <div className="flex gap-4 border-t border-slate-700 pt-6">
                <button onClick={() => addActionToTimeline('approve', 'Aprovado')} className="bg-[#10b981] hover:bg-emerald-600 px-6 py-3 rounded-lg font-bold text-white transition-colors flex-1">Aprovar Protocolo</button>
                <button onClick={() => addActionToTimeline('reject', 'Rejeitado')} className="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-lg font-bold text-white transition-colors flex-1">Rejeitar Protocolo</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function AIChatWidget({ projects, budget, totalAprovado }) {
      const [isOpen, setIsOpen] = useState(false);
      const [messages, setMessages] = useState([{ role: 'ai', text: 'Olá! Sou o Aporte IA.' }]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);

      const handleSend = async (e) => {
        e.preventDefault();
        if (!input.trim()) return;
        setMessages(prev => [...prev, { role: 'user', text: input }]);
        setInput('');
        setIsTyping(true);
        const res = await callGemini();
        setMessages(prev => [...prev, { role: 'ai', text: res }]);
        setIsTyping(false);
      };

      return (
        <>
          <button onClick={() => setIsOpen(!isOpen)} className="fixed bottom-6 right-6 bg-[#10b981] p-4 rounded-full text-white z-50 shadow-lg">
            {isOpen ? <XCircle /> : <MessageSquare />}
          </button>
          {isOpen && (
            <div className="fixed bottom-24 right-6 w-80 bg-slate-900 border border-slate-700 rounded-2xl flex flex-col z-50 h-96 shadow-2xl">
              <div className="p-4 border-b border-slate-700 font-bold bg-[#0a1024] rounded-t-2xl">Aporte IA</div>
              <div className="flex-1 overflow-y-auto p-4 space-y-2">
                {messages.map((m, i) => (
                  <div key={i} className={`p-2 text-sm rounded max-w-[85%] ${m.role === 'user' ? 'bg-indigo-600 ml-auto' : 'bg-slate-700'}`}>{m.text}</div>
                ))}
                {isTyping && <div className="text-slate-400 text-sm">A escrever...</div>}
              </div>
              <form onSubmit={handleSend} className="p-2 border-t border-slate-700 flex">
                <input value={input} onChange={e => setInput(e.target.value)} className="flex-1 bg-slate-800 border border-slate-600 rounded-l px-3 py-2 text-sm outline-none" placeholder="Pergunte algo..." />
                <button type="submit" className="bg-[#10b981] px-3 rounded-r"><Send className="w-4 h-4" /></button>
              </form>
            </div>
          )}
        </>
      );
    }

    // Initialize React App
    const root = createRoot(document.getElementById('root'));
    root.render(<SGASApp />);
  </script>
</body>
</html>
